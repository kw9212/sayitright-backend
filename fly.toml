# fly.toml - Fly.io 앱 설정
# 'app' 값은 fly apps create 로 생성한 앱 이름과 일치해야 합니다.
app = 'sayitright-api'
primary_region = 'nrt'

[build]

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
